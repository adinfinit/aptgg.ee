baseURL: https://aptgg.ee
relativeURLs: true
languageCode: en-US
title: ""
theme: PaperMod
taxonomies:
  category: categories
  tag: tags
permalinks:
  term:
    categories: /category/:slug/
    tags: /tag/:slug/
params:
  description: Game development organization in Tartu, Estonia.
  defaultTheme: dark
  disableThemeToggle: true
  showReadingTime: true
  showToc: false
  showBreadCrumbs: true
  showCodeCopyButtons: true
  comments: true
  hideFooter: true
  assets:
    favicon: /favicon.ico
    disableHLJS: true
  author:
    name: jee7
markup:
  highlight:
    codeFences: true
    guessSyntax: true
    style: monokai
  goldmark:
    renderer:
      unsafe: true
outputs:
  home:
    - HTML
    - RSS
outputFormats:
  RSS:
    mediaType: application/rss+xml
    baseName: feed
