{{- $g := index .Site.Data.galleries (.Get 0) -}}
<div class="bwg-grid">
{{- range $g.images }}
  <a href="{{ .image }}" target="_blank"><img src="{{ .thumb }}" alt="{{ .alt }}" loading="lazy"></a>
{{- end }}
</div>
<style>
.bwg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; margin: 1em 0; }
.bwg-grid img { width: 100%; height: 140px; object-fit: cover; display: block; border-radius: 3px; }
</style>
