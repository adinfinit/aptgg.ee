<dialog id="lightbox">
  <button id="lb-prev" aria-label="Previous">&#10094;</button>
  <img alt="">
  <button id="lb-next" aria-label="Next">&#10095;</button>
</dialog>
<script>
(function () {
  var dlg = document.getElementById('lightbox');
  var img = dlg.querySelector('img');
  var links = [], idx = 0;

  function show(i) {
    idx = (i + links.length) % links.length;
    img.src = links[idx].href;
    img.alt = links[idx].querySelector('img').alt;
  }
  document.querySelectorAll('.gallery-grid').forEach(function (grid) {
    var gridLinks = Array.prototype.slice.call(grid.querySelectorAll('a'));
    gridLinks.forEach(function (a, i) {
      a.addEventListener('click', function (e) {
        e.preventDefault();
        links = gridLinks;
        show(i);
        dlg.showModal();
      });
    });
  });
  document.getElementById('lb-prev').addEventListener('click', function () { show(idx - 1); });
  document.getElementById('lb-next').addEventListener('click', function () { show(idx + 1); });
  dlg.addEventListener('click', function (e) { if (e.target === dlg || e.target === img) dlg.close(); });
  dlg.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowLeft') show(idx - 1);
    if (e.key === 'ArrowRight') show(idx + 1);
  });
})();
</script>
